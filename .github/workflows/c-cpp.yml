name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Show repository files
      run: ls -la
    - name: Configure (if present)
      run: |
        if [ -x ./configure ]; then
          echo "Running ./configure"
          ./configure
        elif [ -f ./configure ]; then
          echo "Making configure executable and running"
          chmod +x ./configure
          ./configure
        else
          echo "No configure script found — skipping"
        fi
    - name: Build (if Makefile present)
      run: |
        if [ -f Makefile ] || [ -f makefile ]; then
          echo "Found Makefile — running make"
          make
        else
          echo "No Makefile found — skipping build step"
        fi
    - name: Run check target (if defined)
      run: |
        if [ -f Makefile ] && grep -q '^check:' Makefile; then
          make check
        else
          echo "No 'check' target in Makefile — skipping"
        fi
    - name: Run distcheck target (if defined)
      run: |
        if [ -f Makefile ] && grep -q '^distcheck:' Makefile; then
          make distcheck
        else
          echo "No 'distcheck' target in Makefile — skipping"
        fi
